services:
  - type: web
    name: meme-app-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: meme-app-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://metaloziz.github.io
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

databases:
  - name: meme-app-db
    plan: free
